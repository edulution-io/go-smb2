on: [push, pull_request]
jobs:
  gofmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'
    - run: |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "$unformatted"
          gofmt -d .
          exit 1
        fi

  test_linux:
    strategy:
      matrix:
        go: ['1.25', '1.26']
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go }}
        # Replaces the separate actions/cache step. The v1 and v2 cache
        # backends were retired on 2025-03-01 and any workflow still calling
        # them is failed automatically.
        cache: true
    - run: |
        sudo apt-get update
        sudo apt-get install -y samba
        sudo groupadd smbgroup
        sudo useradd smbuser -G smbgroup
        (echo Smbpasswd12345; echo Smbpasswd12345) | sudo smbpasswd -a -s smbuser
        sudo cp ./.github/smb.conf /etc/samba/smb.conf
        sudo smbd
    - run: |
        cp ./.github/client_conf.json ./
        go test -v -race ./...

  # Left as it was written, and switched off rather than half-fixed: it still
  # uses the retired cache backend and its share setup has not run since 2022,
  # so it needs a pass of its own instead of riding along with the Linux job.
  test_windows:
    if: false
    strategy:
      matrix:
        go: [1.11, 1.17]
    runs-on: windows-latest
    steps:
    - uses: actions/setup-go@v3
      with:
        go-version: ${{ matrix.go }}
    - uses: actions/checkout@v3
    - run: |
        mkdir C:\tmp
        net user smbuser Smbpasswd12345 /add
        net share tmp="C:\tmp" /GRANT:smbuser,full
        net share tmp2="C:\tmp" /GRANT:smbuser,read
    - uses: actions/cache@v2
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
          ~/Library/Caches/go-build
          ~\AppData\Local\go-build
        key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}
        restore-keys: ${{ runner.os }}-go-${{ matrix.go }}-
    - run: |
        cp ./.github/client_conf.json ./
        go test -v -race ./...
